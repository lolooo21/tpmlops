project:
  name: jupyterproject

api:
  validation:
    min_trip_distance_meters: 50
    nyc_bounding_box:
      longitude:
        min: -74.30
        max: -73.70
      latitude:
        min: 40.50
        max: 40.95

paths:
  raw_data: ./data/raw
  processed_data: ./data/processed
  models: ./models
  model_path: ./models/taxi_trip_duration.model
  model_ridge_path: ./models/taxi_trip_duration_ridge.model
  model_custom_path: ./models/taxi_trip_duration_custom.model
  model_custom_metadata_path: ./models/taxi_trip_duration_custom.metadata.json
  model_custom_versions_dir: ./models/custom_versions
  notebooks: ./notebooks
  reports: ./reports
  figures: ./reports/figures
  db_path: ./data/taxi_trip_duration.db

ml:
  random_state: 42
  test_size: 0.3

dataset:
  csv_file: New_York_City_Taxi_Trip_Duration.csv
  target_column: trip_duration
